<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER — PlataformaEnsinoDB</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --border: #1f2330;
            --accent: #4f8ef7;
            --accent2: #7c5cfc;
            --accent3: #2ec4b6;
            --accent4: #f76f4f;
            --accent5: #f7c948;
            --text: #e2e6f0;
            --muted: #5a6280;
            --pk: #f7c948;
            --fk: #4f8ef7;
            --col: #8a94b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 28px 40px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

            header h1 {
                font-family: 'Syne', sans-serif;
                font-size: 18px;
                font-weight: 700;
                letter-spacing: -0.5px;
                color: var(--text);
            }

            header span {
                font-size: 11px;
                color: var(--muted);
                background: var(--surface);
                border: 1px solid var(--border);
                padding: 3px 10px;
                border-radius: 20px;
            }

        .legend {
            display: flex;
            gap: 20px;
            margin-left: auto;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        .canvas-wrap {
            overflow: auto;
            padding: 40px;
            cursor: grab;
        }

            .canvas-wrap:active {
                cursor: grabbing;
            }

        #er-canvas {
            display: block;
            min-width: 2400px;
        }

        .table-group {
            cursor: pointer;
        }

        .table-header {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .col-name {
            font-size: 11px;
            fill: var(--col);
            font-family: 'JetBrains Mono', monospace;
        }

        .col-type {
            font-size: 10px;
            fill: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-pk {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            fill: #0d0f14;
        }

        .badge-fk {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            fill: #0d0f14;
        }

        .rel-line {
            fill: none;
            stroke-width: 1.5;
            opacity: 0.45;
        }

        .table-group:hover .rel-line {
            opacity: 1;
        }

        .tooltip {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 11px;
            color: var(--text);
            pointer-events: none;
            display: none;
            z-index: 999;
            max-width: 240px;
        }
    </style>
</head>

    <script>
        // drag to pan
        const wrap = document.getElementById('canvas-wrap');
        let dragging = false, startX, startY, scrollLeft, scrollTop;
        wrap.addEventListener('mousedown', e => {
            dragging = true;
            startX = e.pageX - wrap.offsetLeft;
            startY = e.pageY - wrap.offsetTop;
            scrollLeft = wrap.scrollLeft;
            scrollTop = wrap.scrollTop;
        });
        wrap.addEventListener('mousemove', e => {
            if (!dragging) return;
            e.preventDefault();
            wrap.scrollLeft = scrollLeft - (e.pageX - wrap.offsetLeft - startX);
            wrap.scrollTop = scrollTop - (e.pageY - wrap.offsetTop - startY);
        });
        ['mouseup','mouseleave'].forEach(ev => wrap.addEventListener(ev, () => dragging = false));
    </script>
